services:
  - type: web
    name: rich-star-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
    disk:
      name: skyfield-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
